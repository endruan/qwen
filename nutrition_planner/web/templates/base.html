<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nutrition Planner{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Боковая навигация -->
        <aside class="sidebar">
            <div class="logo">
                <h1>🍽️ Nutrition Planner</h1>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                    <span class="icon">📊</span>
                    <span>Панель управления</span>
                </a>
                <a href="/profile" class="nav-item {% if active_page == 'profile' %}active{% endif %}">
                    <span class="icon">👤</span>
                    <span>Профиль</span>
                </a>
                <a href="/ingredients" class="nav-item {% if active_page == 'ingredients' %}active{% endif %}">
                    <span class="icon">🥗</span>
                    <span>Ингредиенты</span>
                </a>
                <a href="/recipes" class="nav-item {% if active_page == 'recipes' %}active{% endif %}">
                    <span class="icon">📖</span>
                    <span>Рецепты</span>
                </a>
                <a href="/meal-planner" class="nav-item {% if active_page == 'meal-planner' %}active{% endif %}">
                    <span class="icon">📅</span>
                    <span>Планировщик</span>
                </a>
                <a href="/shopping-list" class="nav-item {% if active_page == 'shopping-list' %}active{% endif %}">
                    <span class="icon">🛒</span>
                    <span>Список покупок</span>
                </a>
            </nav>
            <div class="user-info">
                <p>{{ user.name }}</p>
                <small>{{ user.weight }} кг | {{ bmi|default(0) }} ИМТ</small>
            </div>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
