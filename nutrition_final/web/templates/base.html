<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Planner</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h2>🍏 NutriPlan</h2>
            <ul>
                <li><a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">📊 Дашборд</a></li>
                <li><a href="/profile" class="{% if active_page == 'profile' %}active{% endif %}">👤 Профиль</a></li>
                <li><a href="/ingredients" class="{% if active_page == 'ingredients' %}active{% endif %}">🥕 Ингредиенты</a></li>
                <li><a href="/recipes" class="{% if active_page == 'recipes' %}active{% endif %}">🍳 Рецепты</a></li>
                <li><a href="/meal-planner" class="{% if active_page == 'planner' %}active{% endif %}">📅 Планировщик</a></li>
                <li><a href="/shopping-list" class="{% if active_page == 'shopping' %}active{% endif %}">🛒 Покупки</a></li>
            </ul>
        </nav>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
